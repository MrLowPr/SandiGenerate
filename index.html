<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SandiGen Pro | Custom Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #advanced-menu { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        #advanced-menu.open { max-height: 500px; }
        
        /* Background Layer */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: filter 0.5s, background-image 0.5s;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4 font-sans transition-all">

    <!-- Dinamis Background Layer -->
    <div id="bg-layer" class="bg-slate-900"></div>

    <!-- LOGIN SECTION -->
    <div id="login-screen" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex bg-indigo-600 p-4 rounded-full mb-4 shadow-xl shadow-indigo-200">
                <i data-lucide="fingerprint" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800">SandiGen <span class="text-indigo-600 font-normal underline decoration-indigo-300">Auth</span></h1>
        </div>
        <form id="login-form" class="space-y-4">
            <input type="text" id="username" placeholder="admin" required class="w-full bg-slate-50 border-2 border-slate-100 px-4 py-4 rounded-2xl focus:border-indigo-500 outline-none transition-all">
            <input type="password" id="password" placeholder="admin" required class="w-full bg-slate-50 border-2 border-slate-100 px-4 py-4 rounded-2xl focus:border-indigo-500 outline-none transition-all">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 uppercase tracking-widest">Login Access</button>
        </form>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="main-app" class="hidden w-full max-w-md glass-card rounded-[2.5rem] shadow-2xl p-8 border border-white/50">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 p-2 rounded-xl shadow-lg"><i data-lucide="key-round" class="text-indigo-400 w-5 h-5"></i></div>
                <h1 class="text-xl font-black tracking-tight text-slate-800">SandiGen <span class="text-indigo-600">Ultra</span></h1>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-red-500 transition-colors p-2"><i data-lucide="power" class="w-5 h-5"></i></button>
        </div>

        <!-- Display Area -->
        <div class="relative mb-8 group">
            <input type="text" id="password-display" readonly class="w-full bg-white/50 border-2 border-white text-slate-800 font-mono text-xl px-5 py-6 rounded-3xl text-center shadow-inner group-hover:border-indigo-200 transition-all">
            <button id="copy-btn" class="absolute right-3 top-1/2 -translate-y-1/2 p-3 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all active:scale-90"><i data-lucide="copy" class="w-5 h-5"></i></button>
        </div>

        <!-- Main Controls -->
        <div class="space-y-6">
            <div>
                <div class="flex justify-between text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-slate-400">
                    <span>Entropy Length</span>
                    <span id="length-val" class="text-indigo-600 bg-indigo-100 px-3 py-1 rounded-lg">24</span>
                </div>
                <input type="range" id="length-slider" min="8" max="100" value="24" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <!-- Advanced Panel -->
            <div class="bg-white/40 border border-white/60 rounded-3xl p-5 shadow-sm">
                <button id="toggle-advanced" class="flex items-center justify-between w-full text-xs font-black text-slate-600 uppercase tracking-widest">
                    <span class="flex items-center gap-2"><i data-lucide="sliders" class="w-4 h-4"></i> Lanjutan & Style</span>
                    <i data-lucide="chevron-down" id="chevron-icon" class="w-4 h-4 transition-transform"></i>
                </button>
                
                <div id="advanced-menu" class="space-y-5">
                    <!-- Custom Char Input -->
                    <div class="pt-5">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-2 text-center">Scramble Atoms</label>
                        <input type="text" id="custom-text" placeholder="Wajib ada..." 
                            class="w-full bg-white border border-slate-100 px-4 py-3 rounded-xl text-sm focus:border-indigo-400 outline-none font-mono text-center">
                    </div>

                    <!-- Custom Wallpaper -->
                    <div class="pt-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-2 text-center">Custom Wallpaper</label>
                        <div class="flex items-center justify-center w-full">
                            <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-white/50 hover:bg-white transition-all">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <i data-lucide="image-plus" class="w-6 h-6 text-slate-400 mb-2"></i>
                                    <p class="text-[10px] text-slate-400">Klik untuk upload foto</p>
                                </div>
                                <input id="bg-upload" type="file" class="hidden" accept="image/*" />
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button id="generate-btn" class="w-full mt-8 bg-slate-900 hover:bg-indigo-700 text-white font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-3 shadow-2xl transition-all active:scale-95">
            <i data-lucide="refresh-cw" id="refresh-icon" class="w-5 h-5"></i>
            GENERATE ENCRYPTION
        </button>
    </div>

    <script>
        lucide.createIcons();

        const bgLayer = document.getElementById('bg-layer');
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const customTextInput = document.getElementById('custom-text');
        const bgUpload = document.getElementById('bg-upload');

        // Logic Background Upload
        bgUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    bgLayer.style.backgroundImage = `url('${event.target.result}')`;
                    // Tambahkan blur sedikit agar card terlihat pop-up
                    bgLayer.style.filter = "blur(4px) brightness(0.6)";
                };
                reader.readAsDataURL(file);
            }
        });

        // Logic Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin') {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                generatePassword();
            } else { alert("Kredensial Salah!"); }
        });

        // Toggle Menu
        document.getElementById('toggle-advanced').addEventListener('click', () => {
            document.getElementById('advanced-menu').classList.toggle('open');
            document.getElementById('chevron-icon').classList.toggle('rotate-180');
        });

        // Atomic Scramble Engine
        function generatePassword() {
            const length = parseInt(document.getElementById('length-slider').value);
            const customChars = customTextInput.value.split('');
            
            if (customChars.length > length) {
                alert("Karakter kustom terlalu panjang!");
                return;
            }

            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let passwordArray = [...customChars];
            
            const randomValues = new Uint32Array(length - customChars.length);
            window.crypto.getRandomValues(randomValues);

            for (let i = 0; i < randomValues.length; i++) {
                passwordArray.push(charset.charAt(randomValues[i] % charset.length));
            }

            // CSPRNG Shuffle
            for (let i = passwordArray.length - 1; i > 0; i--) {
                const jBuffer = new Uint32Array(1);
                window.crypto.getRandomValues(jBuffer);
                const j = jBuffer[0] % (i + 1);
                [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
            }

            document.getElementById('password-display').value = passwordArray.join('');
            
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }

        // Action Listeners
        document.getElementById('generate-btn').addEventListener('click', generatePassword);
        document.getElementById('length-slider').addEventListener('input', (e) => {
            document.getElementById('length-val').innerText = e.target.value;
        });

        document.getElementById('copy-btn').addEventListener('click', function() {
            navigator.clipboard.writeText(document.getElementById('password-display').value);
            this.classList.add('bg-green-500');
            setTimeout(() => this.classList.remove('bg-green-500'), 1000);
        });

        document.getElementById('logout-btn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
